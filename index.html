<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>山田太郎 | 自己紹介</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    html {
      font-size: 200%;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: #fdf6f0;
      color: #4a4a4a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border-radius: 2rem;
      padding: 3rem 2.5rem;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(180, 150, 200, 0.15);
    }

    /* プロフィール写真エリア */
    .photo-area {
      display: flex;
      justify-content: center;
      margin-bottom: 1.8rem;
    }

    .photo-frame {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #e8d5f9;
    }

    /* 名前・肩書き */
    .name-section {
      text-align: center;
      margin-bottom: 2rem;
    }

    .name {
      font-size: 2rem;
      font-weight: 700;
      color: #6b5b8e;
      letter-spacing: 0.08em;
      line-height: 1.2;
    }

    .job-title {
      display: inline-block;
      margin-top: 0.6rem;
      padding: 0.3rem 1.2rem;
      background: #f0e8ff;
      color: #8b6fbf;
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: 999px;
      letter-spacing: 0.1em;
    }

    /* セクション共通 */
    .section {
      margin-bottom: 1.8rem;
    }

    .section-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: #9b7ec8;
      margin-bottom: 1rem;
      padding-left: 0.7rem;
      border-left: 4px solid #d8b8f0;
    }

    .section-title span {
      display: inline;
    }

    /* 趣味タグ */
    .hobbies {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .hobby-tag {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.45rem 1rem;
      border-radius: 999px;
      font-size: 0.88rem;
      font-weight: 500;
    }

    .hobby-tag:nth-child(1) {
      background: #fde8ee;
      color: #c0607a;
    }

    .hobby-tag:nth-child(2) {
      background: #fff3e0;
      color: #c07040;
    }

    .hobby-tag:nth-child(3) {
      background: #e8f4fd;
      color: #4080b0;
    }

    .hobby-tag:nth-child(4) {
      background: #e8fdf0;
      color: #40a070;
    }

    .food-tag:nth-child(1) {
      background: #fdeee8;
      color: #c06040;
    }

    .food-tag:nth-child(2) {
      background: #fdf8e8;
      color: #b08030;
    }

    .food-tag:nth-child(3) {
      background: #f0fde8;
      color: #608040;
    }

    /* 自己紹介文 */
    .bio-text {
      font-size: 0.95rem;
      line-height: 2;
      color: #5a5a5a;
    }

    /* 区切り線 */
    .divider {
      border: none;
      border-top: 1px solid #f0e8f8;
      margin: 1.8rem 0;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- プロフィール写真 -->
    <div class="photo-area">
      <img src="jojo_1.png" alt="プロフィール写真" class="photo-frame">
    </div>

    <!-- 名前・肩書き -->
    <div class="name-section">
      <div class="name">まーちん</div>
      <div class="job-title">フリーランスSE</div>
    </div>

    <hr class="divider">

    <!-- 自己紹介文 -->
    <div class="section">
      <div class="section-title"><span>自己紹介</span></div>
      <p class="bio-text">
        はじめまして！まーちんと申します。フリーランスSEとして、人と関わりながら仕事するのは好きなので、やりやすい環境作りを心がけています。趣味はカフェ巡りと読書、映画鑑賞、そして散歩で、週末はお気に入りのカフェでコーヒーを飲みながら本を読む時間がとても好きです。仕事を通じて、誰かの日常を少し便利にできたら嬉しいと思っています。どうぞよろしくお願いします！
      </p>
    </div>

    <hr class="divider">

    <!-- 趣味 -->
    <div class="section">
      <div class="section-title"><span>趣味</span></div>
      <div class="hobbies">
        <span class="hobby-tag">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
          </svg>
          読書
        </span>
        <span class="hobby-tag">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
            <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
            <line x1="6" y1="1" x2="6" y2="4"/>
            <line x1="10" y1="1" x2="10" y2="4"/>
            <line x1="14" y1="1" x2="14" y2="4"/>
          </svg>
          カフェ巡り
        </span>
        <span class="hobby-tag">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/>
            <line x1="7" y1="2" x2="7" y2="22"/>
            <line x1="17" y1="2" x2="17" y2="22"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <line x1="2" y1="7" x2="7" y2="7"/>
            <line x1="2" y1="17" x2="7" y2="17"/>
            <line x1="17" y1="17" x2="22" y2="17"/>
            <line x1="17" y1="7" x2="22" y2="7"/>
          </svg>
          映画鑑賞
        </span>
        <span class="hobby-tag">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M13 4a1 1 0 1 0 2 0 1 1 0 0 0-2 0"/>
            <path d="M7.5 17l2-6 3 3 2-4 3 7"/>
            <path d="M3 20h18"/>
          </svg>
          散歩
        </span>
      </div>
    </div>

    <hr class="divider">

    <!-- 好きな食べ物 -->
    <div class="section">
      <div class="section-title"><span>好きな食べ物</span></div>
      <div class="hobbies">
        <span class="hobby-tag food-tag">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          ハンバーグ
        </span>
        <span class="hobby-tag food-tag">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
            <line x1="9" y1="9" x2="9.01" y2="9"/>
            <line x1="15" y1="9" x2="15.01" y2="9"/>
          </svg>
          オムライス
        </span>
        <span class="hobby-tag food-tag">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 11l19-9-9 19-2-8-8-2z"/>
          </svg>
          カレー
        </span>
      </div>
    </div>

  </div>
</body>
</html>
